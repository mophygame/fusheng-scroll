<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07090d" />
    <meta name="description" content="沐眠之地恭喜你破關《燈晝餘燼》" />
    <title>燈晝餘燼</title>
    <link rel="preload" href="./assets/images/title-city.webp" as="image" />
    <link rel="preload" href="./assets/images/title.webp" as="image" />
    <link rel="preload" href="./assets/images/subtitle.webp" as="image" />
    <link rel="preload" href="./assets/images/bookstoreowner_mu.webp" as="image" />
    <link rel="preload" href="./assets/images/bookstoreowner_mian.webp" as="image" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="game" aria-live="polite">
      <div id="scene" class="scene scene-title">
        <div class="scene-bg" aria-hidden="true"></div>
        <div class="vignette" aria-hidden="true"></div>
        <div id="embers" class="embers" aria-hidden="true"></div>

        <header class="game-hud">
          <button id="sound-toggle" class="icon-button" type="button" aria-label="切換音效">
            <span class="sound-on">聲</span>
            <span class="sound-off">靜</span>
          </button>
          <button id="music-toggle" class="icon-button music-toggle" type="button" aria-label="關閉背景音樂">
            <span class="music-on">樂</span>
            <span class="music-off">停</span>
          </button>
          <button id="books-toggle" class="icon-button books-toggle" type="button" aria-label="查看書卷" hidden>
            <span>命書</span>
          </button>
        </header>

        <section id="title-screen" class="screen title-screen">
          <p class="eyebrow">以史為鏡，可以知興替</p>
          <h1 class="game-title">
            <img src="./assets/images/title.webp" alt="浮生卷" />
          </h1>
          <div class="title-rule">
            <img src="./assets/images/subtitle.webp" alt="如沐墨眠 x Touchie" />
          </div>
          <p class="title-copy">命簿已開，你可還記得故人？</p>
          <button id="enter-button" class="enter-button" type="button">
            <span>入 卷</span>
            <small>ENTER THE STORY</small>
          </button>
          <p class="headphone-note">建議開啟聲音，獲得完整體驗</p>
        </section>

        <section id="story-screen" class="screen story-screen" hidden>
          <div id="chapter-card" class="chapter-card">
            <span>序 · 章</span>
            <h2>不見書肆</h2>
            <p>有人賣書，也有人賣前塵。</p>
          </div>

          <div id="shopkeepers" class="shopkeepers" aria-hidden="true">
            <div id="shopkeeper-mian" class="shopkeeper shopkeeper-mian">
              <div class="portrait-halo"></div>
              <img src="./assets/images/bookstoreowner_mian.webp" alt="" />
              <p>書肆主人 · 眠</p>
            </div>
            <div id="shopkeeper-mu" class="shopkeeper shopkeeper-mu">
              <div class="portrait-halo"></div>
              <img src="./assets/images/bookstoreowner_mu.webp" alt="" />
              <p>書肆主人 · 沐</p>
            </div>
          </div>

          <div id="dialogue-panel" class="dialogue-panel" hidden>
            <div class="speaker-row">
              <strong id="speaker-name">旁白</strong>
              <span id="progress-mark">01 / 08</span>
            </div>
            <p id="dialogue-text"></p>
            <button id="dialogue-next" class="dialogue-next" type="button" aria-label="繼續對話">
              <span>繼續</span><i></i>
            </button>
            <button id="ask-history-button" class="ask-history-button" type="button" hidden>詢問大封舊史</button>
          </div>

          <div id="scroll-select" class="scroll-select" hidden>
            <header>
              <p>擇一卷，赴一場前世之約</p>
              <h2>五 卷 命 書</h2>
            </header>
            <div id="scroll-grid" class="scroll-grid"></div>
            <button id="shelve-books-button" class="shelve-books-button" type="button" hidden>闔卷歸架</button>
          </div>

          <div id="scroll-reader" class="scroll-reader" hidden>
            <div class="scroll-unroll" aria-hidden="true">
              <i class="scroll-rod scroll-rod-left"></i>
              <i class="scroll-paper"></i>
              <i class="scroll-rod scroll-rod-right"></i>
            </div>
            <article class="scroll-page">
              <button id="close-scroll-button" class="scroll-close" type="button">返回卷封</button>
              <div id="ink-portrait" class="ink-portrait" tabindex="0" aria-label="將滑鼠移至人物上查看前世模樣">
                <div class="ink-wash" aria-hidden="true"></div>
                <div class="portrait-fallback portrait-modern-fallback" aria-hidden="true">
                  <b id="portrait-modern-glyph"></b><span>今生</span>
                </div>
                <div class="portrait-fallback portrait-ancient-fallback" aria-hidden="true">
                  <b id="portrait-ancient-glyph"></b><span>前世</span>
                </div>
                <img id="portrait-modern" class="route-portrait portrait-modern" alt="" />
                <img id="portrait-ancient" class="route-portrait portrait-ancient" alt="" />
                <p class="portrait-hint"><span>今生</span><b>移步換影</b><span>前世</span></p>
              </div>
              <div class="scroll-copy">
                <p id="reader-book-title" class="reader-era"></p>
                <h2 id="reader-name"></h2>
                <div class="reader-divider"><i></i><b id="reader-seal"></b><i></i></div>
                <dl class="character-identities">
                  <div><dt>今生</dt><dd id="reader-modern-role"></dd></div>
                  <div><dt>前世</dt><dd id="reader-ancient-role"></dd></div>
                </dl>
                <blockquote id="reader-line"></blockquote>
                <p id="reader-background" class="reader-prologue"></p>
                <button id="love-letter-button" class="begin-route-button" type="button">展閱情箋</button>
              </div>
            </article>
            <div id="love-letter" class="love-letter" hidden>
              <div class="letter-sheet">
                <button id="close-letter-button" class="letter-close" type="button" aria-label="闔箋收情">×</button>
                <p class="letter-kicker">一紙未寄之書</p>
                <h3 id="letter-name"></h3>
                <p id="letter-text"></p>
                <div class="letter-closing">
                  <p id="letter-wish"></p>
                  <p class="letter-author"><span>念卿人</span><b id="letter-author-name"></b></p>
                  <div id="letter-signature" class="letter-signature"></div>
                </div>
              </div>
            </div>
          </div>

          <div id="history-choice" class="history-choice" hidden>
            <p>第一章 · 大封舊史</p>
            <h2>可願聽一段王朝往事？</h2>
            <div>
              <button id="enter-history-button" type="button">願聞其詳</button>
              <button id="later-history-button" type="button">容我稍候</button>
            </div>
          </div>

          <div id="history-video-screen" class="history-video-screen" hidden>
            <video id="history-video" playsinline preload="metadata">
              <source src="./assets/videos/enter_history.mp4" type="video/mp4" />
            </video>
          </div>
        </section>

        <div id="transition" class="transition" aria-hidden="true">
          <div class="ink ink-a"></div>
          <div class="ink ink-b"></div>
          <span><p>以銅為鏡，可以正衣冠;</p><p>&nbsp;以人為鏡，可以明得失。</p></span>
        </div>
      </div>
    </main>
    <script defer src="./src/game.js"></script>
  </body>
</html>
